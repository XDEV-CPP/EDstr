name: 生成贪吃蛇 GIF

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          pip install pillow
      
      - name: 生成贪吃蛇 GIF
        run: |
          python .github/scripts/generate_snake_gif.py
      
      - name: 提交并推送
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add snake.gif
          git diff --staged --quiet || git commit -m "🔄 更新贪吃蛇 GIF [skip ci]"
          git push
